
services:
  db:
    image: postgres:15
    container_name: rol_db
    environment:
      POSTGRES_USER: rol_user
      POSTGRES_PASSWORD: rol_password
      POSTGRES_DB: rol_narrator_screen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rol_redis
    ports:
      - "6379:6379"

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: rol_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      # Tell Django to wait for DB implicitly or handle it, these just expose them
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: rol_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Use named volume for node_modules to ensure persistence across runs/execs
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
