version: '3.8'

services:
  db:
    image: postgres:15
    container_name: rol_db
    environment:
      POSTGRES_USER: rol_user
      POSTGRES_PASSWORD: rol_password
      POSTGRES_DB: rol_narrator_screen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: rol_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      # Tell Django to wait for DB implicitly or handle it, these just expose them
      DB_HOST: db
      DB_PORT: 5432

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: rol_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Exclude node_modules from being overwritten by the host
      - /app/node_modules

volumes:
  postgres_data:
