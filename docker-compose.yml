
services:
  db:
    image: postgres:15
    container_name: rol_db
    environment:
      POSTGRES_USER: rol_user
      POSTGRES_PASSWORD: rol_password
      POSTGRES_DB: rol_narrator_screen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rol_redis
    ports:
      - "6379:6379"

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: rol_backend
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Ensures Python logs are sent straight to the terminal without buffering
      PYTHONUNBUFFERED: 1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: rol_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  gateway:
    image: caddy:alpine
    container_name: rol_gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  mailpit:
    image: axllent/mailpit
    container_name: rol_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
  frontend_node_modules:
  caddy_data:
  caddy_config:
