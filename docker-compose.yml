
services:
  db:
    image: postgres:15
    container_name: rol_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rol_redis

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: rol_backend
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      # Ensures Python logs are sent straight to the terminal without buffering
      PYTHONUNBUFFERED: 1
      # Email settings — passed through from .env
      EMAIL_HOST: ${EMAIL_HOST:-mailpit}
      EMAIL_PORT: ${EMAIL_PORT:-1025}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rol_worker
    command: celery -A rol_narrator_screen worker -l info
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      PYTHONUNBUFFERED: 1

  ollama:
    image: ollama/ollama:latest
    container_name: rol_ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
      until ollama list > /dev/null 2>&1; do sleep 1; done &&
      ollama pull gemma4:e4b &&
      wait"
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'gemma4:e4b'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: rol_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  gateway:
    image: caddy:alpine
    container_name: rol_gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      ollama:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    container_name: rol_mailpit
    environment:
      - MP_WEBROOT=/email
    ports:
      - "1025:1025"

volumes:
  postgres_data:
  frontend_node_modules:
  caddy_data:
  caddy_config:
  ollama_data:
