
services:
  db:
    image: postgres:15
    container_name: rol_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rol_redis

  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: rol_backend
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      # Ensures Python logs are sent straight to the terminal without buffering
      PYTHONUNBUFFERED: 1
      # Email settings — passed through from .env
      EMAIL_HOST: ${EMAIL_HOST:-mailpit}
      EMAIL_PORT: ${EMAIL_PORT:-1025}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: rol_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  gateway:
    image: caddy:alpine
    container_name: rol_gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  mailpit:
    image: axllent/mailpit
    container_name: rol_mailpit
    environment:
      - MP_WEBROOT=/email
    ports:
      - "1025:1025"

volumes:
  postgres_data:
  frontend_node_modules:
  caddy_data:
  caddy_config:
