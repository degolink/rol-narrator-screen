exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    ".gemini",
    ".agent",
    ".agents",
    ".gsd",
    ".pytest_cache",
    ".vscode",
    "venv",
    "ENV",
    "env",
    "__pycache__",
    "build",
    "dist",
]

[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = [
    "E501",  # line too long, handled by black/ruff format
    "F401",  # unused-import, disable auto-fix deletion
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[lint.isort]
known-first-party = ["rol", "rol_narrator_screen"]

[lint.mccabe]
max-complexity = 10
